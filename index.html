<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOONHUB</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --transition: 650ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Inter", sans-serif;
      }

      body {
        background: #f4845f;
      }

      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background-color: #f4845f;
        transition: background-color var(--transition);
        font-family: "Inter", sans-serif;
      }

      .grain {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        opacity: 0.4;
        background-repeat: repeat;
        background-size: 200px 200px;
        mix-blend-mode: soft-light;
      }

      .ghost {
        position: absolute;
        inset-inline: 0;
        top: 18%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        user-select: none;
        z-index: 2;
        font-family: "Anton", sans-serif;
        font-size: clamp(90px, 28vw, 380px);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
        white-space: nowrap;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 1);
      }

      .brand {
        position: absolute;
        top: 24px;
        left: 16px;
        z-index: 60;
        color: #fff;
        opacity: 0.9;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      @media (min-width: 640px) {
        .brand {
          left: 32px;
        }
      }

      .carousel {
        position: absolute;
        inset: 0;
        z-index: 3;
      }

      .item {
        position: absolute;
        aspect-ratio: 0.6 / 1;
        transform-origin: center bottom;
        will-change: transform, filter, opacity, left;
        transition:
          transform var(--transition),
          filter var(--transition),
          opacity var(--transition),
          left var(--transition),
          height var(--transition),
          bottom var(--transition);
      }

      .item img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: bottom center;
        display: block;
        user-select: none;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .center {
        left: 50%;
        transform: translateX(-50%) scale(1.68);
        opacity: 1;
        filter: blur(0px);
        z-index: 20;
        height: 92%;
        bottom: 0;
      }

      .left {
        left: 30%;
        transform: translateX(-50%) scale(1);
        opacity: 0.85;
        filter: blur(2px);
        z-index: 10;
        height: 28%;
        bottom: 12%;
      }

      .right {
        left: 70%;
        transform: translateX(-50%) scale(1);
        opacity: 0.85;
        filter: blur(2px);
        z-index: 10;
        height: 28%;
        bottom: 12%;
      }

      .back {
        left: 50%;
        transform: translateX(-50%) scale(1);
        opacity: 1;
        filter: blur(4px);
        z-index: 5;
        height: 22%;
        bottom: 12%;
      }

      @media (max-width: 639px) {
        .center {
          transform: translateX(-50%) scale(1.25);
          height: 60%;
          bottom: 22%;
        }

        .left {
          left: 20%;
          height: 16%;
          bottom: 32%;
        }

        .right {
          left: 80%;
          height: 16%;
          bottom: 32%;
        }

        .back {
          height: 13%;
          bottom: 32%;
        }
      }

      .bottom-left {
        position: absolute;
        left: 16px;
        bottom: 24px;
        z-index: 60;
        max-width: 320px;
        color: #fff;
      }

      @media (min-width: 640px) {
        .bottom-left {
          left: 96px;
          bottom: 80px;
        }
      }

      .title {
        margin: 0 0 8px 0;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.02em;
        line-height: 1.1;
        font-size: 16px;
        opacity: 0.95;
      }

      @media (min-width: 640px) {
        .title {
          margin-bottom: 12px;
          font-size: 22px;
        }
      }

      .desc {
        margin: 0 0 16px 0;
        font-size: 12px;
        line-height: 1.6;
        opacity: 0.85;
        display: none;
      }

      @media (min-width: 640px) {
        .desc {
          display: block;
          margin-bottom: 20px;
          font-size: 14px;
        }
      }

      .controls {
        display: flex;
        gap: 12px;
      }

      .btn {
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 1);
        background: transparent;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 150ms ease, background-color 150ms ease, opacity 150ms ease;
        padding: 0;
      }

      .btn:hover {
        transform: scale(1.08);
        background: rgba(255, 255, 255, 0.12);
      }

      .btn:active {
        transform: scale(0.98);
      }

      @media (min-width: 640px) {
        .btn {
          width: 64px;
          height: 64px;
        }
      }

      .bottom-right {
        position: absolute;
        right: 16px;
        bottom: 24px;
        z-index: 60;
        color: #fff;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "Anton", sans-serif;
        font-size: clamp(20px, 4vw, 56px);
        font-weight: 400;
        line-height: 1;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        opacity: 0.95;
        transition: opacity 200ms ease;
      }

      .bottom-right:hover {
        opacity: 1;
      }

      @media (min-width: 640px) {
        .bottom-right {
          right: 40px;
          bottom: 80px;
        }
      }

      .icon {
        width: 26px;
        height: 26px;
        stroke: currentColor;
        stroke-width: 2.25;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .icon-lg {
        width: 20px;
        height: 20px;
      }

      @media (min-width: 640px) {
        .icon-lg {
          width: 32px;
          height: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="hero">
      <div class="grain" id="grain"></div>
      <div class="ghost">3D SHAPE</div>
      <div class="brand">TOONHUB</div>

      <div class="carousel" id="carousel"></div>

      <div class="bottom-left">
        <p class="title">TOONHUB FIGURINES</p>
        <p class="desc">
          The artwork is stunning, shipped fully prepared. The finish is a vision, the 3D craft is flawless. Many thanks! Wishing you the win. Order now.
        </p>
        <div class="controls">
          <button class="btn" id="prevBtn" aria-label="Previous figurine">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6"></path>
            </svg>
          </button>
          <button class="btn" id="nextBtn" aria-label="Next figurine">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 6l6 6-6 6"></path>
            </svg>
          </button>
        </div>
      </div>

      <a class="bottom-right" href="#" aria-label="Discover it">
        DISCOVER IT
        <svg class="icon icon-lg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M13 5l7 7-7 7"></path>
        </svg>
      </a>
    </div>

    <script>
      const IMAGES = [
        { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png', bg: '#F4845F', panel: '#F79B7F' },
        { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png', bg: '#6BBF7A', panel: '#85CC92' },
        { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png', bg: '#E882B4', panel: '#ED9DC4' },
        { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png', bg: '#6EB5FF', panel: '#8DC4FF' },
      ];

      const app = document.getElementById('app');
      const carousel = document.getElementById('carousel');
      const grain = document.getElementById('grain');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      let activeIndex = 0;
      let isAnimating = false;
      let isMobile = window.innerWidth < 640;

      const noiseSvg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
          <filter id="n">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
              <feFuncA type="table" tableValues="0 0.08" />
            </feComponentTransfer>
          </filter>
          <rect width="200" height="200" filter="url(#n)" opacity="0.08" />
        </svg>
      `.trim();

      grain.style.backgroundImage = `url("data:image/svg+xml;charset=utf-8,${encodeURIComponent(noiseSvg)}")`;

      const preloaded = [];
      IMAGES.forEach((item) => {
        const img = new Image();
        img.src = item.src;
        preloaded.push(img);
      });

      function roleFor(index) {
        if (index === activeIndex) return 'center';
        if (index === (activeIndex + 3) % 4) return 'left';
        if (index === (activeIndex + 1) % 4) return 'right';
        return 'back';
      }

      function render() {
        app.style.backgroundColor = IMAGES[activeIndex].bg;
        carousel.innerHTML = '';

        IMAGES.forEach((item, index) => {
          const role = roleFor(index);
          const el = document.createElement('div');
          el.className = `item ${role}`;

          if (role === 'center') {
            el.style.left = '50%';
          } else if (role === 'left') {
            el.style.left = isMobile ? '20%' : '30%';
          } else if (role === 'right') {
            el.style.left = isMobile ? '80%' : '70%';
          } else {
            el.style.left = '50%';
          }

          const mobileCenter = isMobile;
          if (role === 'center') {
            el.style.height = mobileCenter ? '60%' : '92%';
            el.style.bottom = mobileCenter ? '22%' : '0';
            el.style.transform = `translateX(-50%) scale(${mobileCenter ? 1.25 : 1.68})`;
            el.style.opacity = '1';
            el.style.filter = 'blur(0px)';
            el.style.zIndex = '20';
          }

          if (role === 'left' || role === 'right') {
            el.style.height = mobileCenter ? '16%' : '28%';
            el.style.bottom = mobileCenter ? '32%' : '12%';
            el.style.transform = 'translateX(-50%) scale(1)';
            el.style.opacity = '0.85';
            el.style.filter = 'blur(2px)';
            el.style.zIndex = '10';
          }

          if (role === 'back') {
            el.style.height = mobileCenter ? '13%' : '22%';
            el.style.bottom = mobileCenter ? '32%' : '12%';
            el.style.transform = 'translateX(-50%) scale(1)';
            el.style.opacity = '1';
            el.style.filter = 'blur(4px)';
            el.style.zIndex = '5';
          }

          const image = document.createElement('img');
          image.src = item.src;
          image.alt = `TOONHUB figurine ${index + 1}`;
          image.draggable = false;

          el.appendChild(image);
          carousel.appendChild(el);
        });
      }

      function navigate(dir) {
        if (isAnimating) return;
        isAnimating = true;
        activeIndex = dir === 'next' ? (activeIndex + 1) % 4 : (activeIndex + 3) % 4;
        render();
        window.setTimeout(() => {
          isAnimating = false;
        }, 650);
      }

      prevBtn.addEventListener('click', () => navigate('prev'));
      nextBtn.addEventListener('click', () => navigate('next'));

      window.addEventListener('resize', () => {
        const nextMobile = window.innerWidth < 640;
        if (nextMobile !== isMobile) {
          isMobile = nextMobile;
          render();
        }
      });

      render();
    </script>
  </body>
</html>
